<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>O Intruso</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://googleapis.com" rel="stylesheet" />
  </head>

  <body>
    <section id="inicio">
      <button id="btnIniciar">Iniciar</button>
    </section>

    <section class="fase" id="fase1">
      <h2 class="nomeFase">Sala</h2>
      <img src="assets/Imagens/fase1/BALDE.avif" class="obj p1" />
      <img src="assets/Imagens/fase1/CENOURA.avif" class="obj p2" />
      <img src="assets/Imagens/fase1/REGADOR.avif" class="obj p3" />
      <button class="btnAvancar">➜</button>
    </section>

    <section class="fase" id="fase2">
      <h2 class="nomeFase">Quarto</h2>
      <img src="assets/Imagens/fase2/SOS.avif" class="obj p4" />
      <img src="assets/Imagens/fase2/ABACAXI.avif" class="obj p5" />
      <img src="assets/Imagens/fase2/CONTROLE.avif" class="obj p6" />
      <img src="assets/Imagens/fase2/LANTERNA.avif" class="obj p7" />
      <img src="assets/Imagens/fase2/MARTELO.avif" class="obj p8" />
      <button class="btnAvancar">➜</button>
    </section>

    <section class="fase" id="fase3">
      <h2 class="nomeFase">Cozinha</h2>
      <img src="assets/Imagens/fase3/AQUARELA.avif" class="obj p9" />
      <img src="assets/Imagens/fase3/FOGUETE.avif" class="obj p10" />
      <img src="assets/Imagens/fase3/FUTEBOL.avif" class="obj p11" />
      <img src="assets/Imagens/fase3/URSO.avif" class="obj p12" />
      <img src="assets/Imagens/fase3/RAQUETE.avif" class="obj p13" />
      <img src="assets/Imagens/fase3/FONE.avif" class="obj p14" />
      <img src="assets/Imagens/fase3/S.VASO.avif" class="obj p15" />
      <img src="assets/Imagens/fase3/BASQUETE.avif" class="obj p16" />
      <button class="btnAvancar">➜</button>
    </section>

    <section id="final">
      <h2 id="parabens">⭐ Parabéns! ⭐</h2>
      <p id="txtFinal">Você completou o jogo com sucesso!</p>
      <button id="btnVoltar">Voltar</button>
    </section>
    <div id="mensagemAviso"></div>
    <script src="script.js"></script>
  </body>
</html>
